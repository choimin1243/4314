name: Build HWP Merger EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # HWP 관련 라이브러리 빌드를 위해 윈도우 환경 사용

    steps:
    - name: 체크아웃 소스코드
      uses: actions/checkout@v4

    - name: 파이썬 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 의존성 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pywin32 pyinstaller

    - name: 실행 파일(EXE) 생성
      run: |
        pyinstaller --noconsole --onefile main.py
      # --noconsole: 실행 시 터미널 안 뜸, --onefile: 파일 하나로 합침

    - name: 결과물 업로드
      uses: actions/upload-artifact@v4
      with:
        name: HwpMerger-Executable
        path: dist/main.exe
